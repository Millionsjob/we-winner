<!DOCTYPE html>
<html>
<head>
<title>WE Winner</title>
<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
<style>

body{
background:#0b1f3a;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.login{background:#e0e0e0;color:black}
.money{background:#e0e0e0;color:black}

.android{background:#1fa64a;color:white}
.iphone{background:#2d6cdf;color:white}

.card{
background:#1e2b42;
padding:25px;
border-radius:15px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>WE Winner 🏆 Live Voting</h1>

<button class="login" onclick="login()">Login with Google</button>
<br>

<button class="money" onclick="startPayment()">Add Money ₹</button>

<div class="card">

<h2>Android vs iPhone</h2>

<p>Android Votes: <span id="androidVotes">0</span></p>
<button class="android" onclick="voteAndroid()">Vote Android</button>

<p>iPhone Votes: <span id="iphoneVotes">0</span></p>
<button class="iphone" onclick="voteIphone()">Vote iPhone</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getDatabase,
ref,
onValue,
update,
get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getAuth,
signInWithPopup,
GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyBXt1ulK89p469W4BdTUYya0Z4mlF9_o0U",

authDomain: "we-winner.firebaseapp.com",

databaseURL: "https://we-winner-default-rtdb.firebaseio.com",

projectId: "we-winner",

storageBucket: "we-winner.appspot.com",

messagingSenderId: "929426539668",

appId: "1:929426539668:web:bea3ad9fb8f269d10ee081"

};


const app = initializeApp(firebaseConfig);
  window.startPayment = async function(){

const res = await fetch("/api/create-order");
const data = await res.json();

const cashfree = Cashfree({
mode: "sandbox"
});

cashfree.checkout({
paymentSessionId: data.payment_session_id,
redirectTarget: "_self"
});

}

window.startPayment = startPayment;

const db = getDatabase(app);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();


const contestRef = ref(db,"contests/android_vs_iphone");


onValue(contestRef,(snapshot)=>{

const data = snapshot.val();

document.getElementById("androidVotes").innerText = data.android || 0;

document.getElementById("iphoneVotes").innerText = data.iphone || 0;

});


window.login = function(){

signInWithPopup(auth,provider)

.then(()=>{

alert("Login success")

})

.catch((e)=>{

alert(e.message)

})

}



window.voteAndroid = function(){

vote("android")

}


window.voteIphone = function(){

vote("iphone")

}


function vote(type){

const user = auth.currentUser

if(!user){

alert("Login first")

return

}


const walletRef = ref(db,"users/"+user.uid+"/balance")


get(walletRef).then((snapshot)=>{


let balance = snapshot.val() || 0


if(balance < 10){

alert("Not enough balance")

return

}


update(ref(db,"users/"+user.uid),{

balance: balance - 10

})


get(contestRef).then((snap)=>{


const data = snap.val()


if(type==="android"){

update(contestRef,{

android:(data.android || 0)+1

})

}

else{

update(contestRef,{

iphone:(data.iphone || 0)+1

})

}

})


})

}



window.addMoney = function(){


const user = auth.currentUser


if(!user){

alert("Login first")

return

}


let amount = prompt("Enter amount")


if(!amount) return


const walletRef = ref(db,"users/"+user.uid+"/balance")


get(walletRef).then((snapshot)=>{


let current = snapshot.val() || 0


update(ref(db,"users/"+user.uid),{

balance: current + Number(amount)

})


alert("Money added")


})

}


</script>


</body>
</html>
