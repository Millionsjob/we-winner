<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE Winner Live Voting</title>

<style>
body{
font-family:Arial;
background:#0c1b34;
color:white;
text-align:center;
padding:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
margin:10px;
font-size:16px;
cursor:pointer;
}

.login{background:#e0e0e0;color:black}
.money{background:#e0e0e0;color:black}

.android{background:#1fa64a;color:white}
.iphone{background:#2d6cdf;color:white}

.card{
background:#1e2b42;
padding:25px;
border-radius:15px;
margin-top:20px;
}
</style>
</head>

<body>

<h1>WE Winner 🏆 Live Voting</h1>

<button class="login" onclick="login()">Login with Google</button>
<br>
<button class="money" onclick="addMoney()">Add Money ₹</button>

<div class="card">

<h2>Android vs iPhone</h2>

<p>Android Votes: <span id="androidCount">0</span></p>
<button class="android" onclick="voteAndroid()">Vote Android</button>

<p>iPhone Votes: <span id="iphoneCount">0</span></p>
<button class="iphone" onclick="voteIphone()">Vote iPhone</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
get,
update,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBXt1ulK89p469W4BdTUYya0Z4mlF9_o0U",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "YOUR_DATABASE_URL",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const contestRef = ref(db,"contest");


window.login = function(){

const provider = new GoogleAuthProvider();

signInWithPopup(auth,provider)
.then(()=>{
alert("Login success");
});

}


window.addMoney = function(){

let amount = prompt("Enter amount");

if(!amount) return;

const user = auth.currentUser;

if(!user){
alert("Login first");
return;
}

const walletRef = ref(db,"users/"+user.uid+"/balance");

get(walletRef).then((snapshot)=>{

let current = snapshot.val() || 0;

update(ref(db,"users/"+user.uid),{
balance: current + Number(amount)
});

alert("Money added");

});

}


window.voteAndroid = function(){

const user = auth.currentUser;

if(!user){
alert("Login first");
return;
}

const walletRef = ref(db,"users/"+user.uid+"/balance");

get(walletRef).then((snapshot)=>{

let balance = snapshot.val() || 0;

if(balance < 10){
alert("Not enough balance");
return;
}

update(ref(db,"users/"+user.uid),{
balance: balance - 10
});

get(contestRef).then((snap)=>{

const data = snap.val() || {};

update(contestRef,{
android:(data.android || 0)+1
});

});

});

}


window.voteIphone = function(){

const user = auth.currentUser;

if(!user){
alert("Login first");
return;
}

const walletRef = ref(db,"users/"+user.uid+"/balance");

get(walletRef).then((snapshot)=>{

let balance = snapshot.val() || 0;

if(balance < 10){
alert("Not enough balance");
return;
}

update(ref(db,"users/"+user.uid),{
balance: balance - 10
});

get(contestRef).then((snap)=>{

const data = snap.val() || {};

update(contestRef,{
iphone:(data.iphone || 0)+1
});

});

});

}


onValue(contestRef,(snapshot)=>{

const data = snapshot.val() || {};

document.getElementById("androidCount").innerText = data.android || 0;

document.getElementById("iphoneCount").innerText = data.iphone || 0;

});


</script>

</body>
</html>
