<!DOCTYPE html>
<html>
<head>
  <title>WE Winner 🏆</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #111827;
    }

    .card {
      background: #1f2937;
      margin: 20px;
      padding: 20px;
      border-radius: 12px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .android {
      background: #16a34a;
      color: white;
    }

    .iphone {
      background: #2563eb;
      color: white;
    }

    h2 {
      margin-top: 0;
    }

    .count {
      font-size: 22px;
      margin: 10px 0;
    }
  </style>
</head>
<body>

<header>WE Winner 🏆 Live Voting</header>
  <div style="margin:20px;">
<button onclick="loginGoogle()">Login with Google</button>
<p id="userInfo"></p>
    <p id="walletBalance"></p>
    <button onclick="addMoney()">Add Money ₹</button>
  </div>

<div class="card">
  <h2>Android vs iPhone</h2>

  <div class="count">Android Votes: <span id="androidCount">0</span></div>
  <button class="android" onclick="voteAndroid()">Vote Android</button>

  <div class="count">iPhone Votes: <span id="iphoneCount">0</span></div>
  <button class="iphone" onclick="voteIphone()">Vote iPhone</button>
</div>

<script type="module">
  import { getAuth, signInWithPopup, GoogleAuthProvider,onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update,get,set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBXt1ulK89p469W4BdTUYya0Z4mlF9_o0U",
    authDomain: "we-winner.firebaseapp.com",
    databaseURL: "https://we-winner-default-rtdb.firebaseio.com",
    projectId: "we-winner",
    storageBucket: "we-winner.appspot.com",
    messagingSenderId: "929426539668",
    appId: "1:929426539668:web:bea3ad9fb8f269d10ee081"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth();
  onAuthStateChanged(auth, (user) => {

if (user) {

document.getElementById("userInfo").innerText =
"Welcome " + user.displayName;

const walletRef = ref(db,"users/"+user.uid+"/balance");

onValue(walletRef,(snapshot)=>{

const balance = snapshot.val() || 0;

document.getElementById("walletBalance").innerText =
"Wallet Balance: ₹" + balance;

});

}

});
const provider = new GoogleAuthProvider();

window.loginGoogle = function(){

signInWithPopup(auth, provider)
.then((result)=>{

const user = result.user;
const userRef = ref(db, "users/" + user.uid);

get(userRef).then((snapshot)=>{

if(!snapshot.exists()){

set(userRef,{
name: user.displayName,
balance: 0
});

}

});



})
.catch((error)=>{
console.log(error)
});

}

  const contestRef = ref(db, 'contests/android_vs_iphone');

  onValue(contestRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      document.getElementById("androidCount").innerText = data.android || 0;
      document.getElementById("iphoneCount").innerText = data.iphone || 0;
    }
  });

  window.voteAndroid = function(){

const user = auth.currentUser;

if(!user){
alert("Login first");
return;
}

get(contestRef).then((snapshot)=>{

const data = snapshot.val();

update(contestRef,{
android:(data.android || 0)+1
});


});

}

  window.voteIphone = function(){
    
const user = auth.currentUser;

if(!user){
alert("Login first");
return;
}

get(contestRef).then((snapshot)=>{

const data = snapshot.val();

update(contestRef,{
iphone:(data.iphone || 0)+1
});

});

}
  function addMoney(){

let amount = prompt("Enter amount to add");

if(!amount) return;

alert("You want to add ₹" + amount);

  }
</script>

</body>
</html>
